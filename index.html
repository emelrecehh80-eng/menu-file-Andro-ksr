<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSR OFFICIAL - Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #0b0e1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: linear-gradient(145deg, #141a2b, #1a2135);
      border-radius: 30px;
      padding: 25px 20px 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #2a3a6b;
      text-align: center;
    }
    /* Logo gambar */
    .logo {
      width: 100%;
      max-width: 180px;
      border-radius: 20px;
      margin: 0 auto 10px;
      display: block;
      box-shadow: 0 0 20px #7a5cff66;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #f0e6ff;
      text-shadow: 0 0 15px #7a5cff, 0 0 30px #3b1f8a;
      letter-spacing: 3px;
      margin-bottom: 2px;
    }
    .subtitle {
      color: #8a9fcf;
      font-size: 14px;
      letter-spacing: 4px;
      border-bottom: 2px solid #3a4b7a;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 14px;
      border-left: 5px solid #5b7cfa;
      transition: 0.2s;
    }
    .menu-item:hover {
      background: rgba(90, 120, 255, 0.15);
    }
    .menu-item .name {
      font-size: 17px;
      font-weight: 600;
      color: #d6e2ff;
      text-align: left;
    }
    .menu-item .price {
      font-size: 17px;
      font-weight: 700;
      background: #2b3e70;
      padding: 2px 14px;
      border-radius: 30px;
      color: #ffd966;
      box-shadow: 0 0 6px #ffbb33;
    }
    .menu-item button {
      background: #25D366;
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 10px #25D36688;
    }
    .menu-item button:hover {
      background: #2ee07a;
      transform: scale(1.05);
    }
    .footer {
      text-align: center;
      margin-top: 25px;
      color: #5a6f99;
      font-size: 13px;
      border-top: 1px dashed #2f4068;
      padding-top: 18px;
    }
    .footer span {
      color: #b7c9ff;
    }
    /* Warna khusus untuk HOLOGRAM */
    .menu-item.hologram {
      border-left-color: #ff6bff;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 🔽 GANTI src dengan nama file gambar yang kamu upload -->
  <img class="logo" src="file_00000000ca18820889fd822b43c260ec_7252857052815249526.webp" alt="KSR OFFICIAL">

  <h1>KSR OFFICIAL</h1>
  <div class="subtitle">✦ MENU FILE ANDRO ✦</div>

  <!-- Daftar menu -->
  <div class="menu-item">
    <span class="name">🎯 AIMLOCK 95%</span>
    <span class="price">25K</span>
    <button onclick="beli('AIMLOCK 95%', 25000)">BELI</button>
  </div>
  <div class="menu-item">
    <span class="name">🛡️ BODY LOCK 95%</span>
    <span class="price">20K</span>
    <button onclick="beli('BODY LOCK 95%', 20000)">BELI</button>
  </div>
  <div class="menu-item">
    <span class="name">🎯 HEAD LOCK 50%</span>
    <span class="price">20K</span>
    <button onclick="beli('HEAD LOCK 50%', 20000)">BELI</button>
  </div>
  <div class="menu-item">
    <span class="name">🤖 AIMBOT</span>
    <span class="price">15K</span>
    <button onclick="beli('AIMBOT', 15000)">BELI</button>
  </div>
  <div class="menu-item">
    <span class="name">💥 MAGIC BULLET</span>
    <span class="price">40K</span>
    <button onclick="beli('MAGIC BULLET', 40000)">BELI</button>
  </div>
  <!-- HOLOGRAM dengan border unik -->
  <div class="menu-item hologram">
    <span class="name">🌀 HOLOGRAM</span>
    <span class="price">10K</span>
    <button onclick="beli('HOLOGRAM', 10000)">BELI</button>
  </div>

  <div class="footer">
    <span>⚡</span> Klik BELI untuk order 1 item via WhatsApp <span>⚡</span><br>
    <span style="font-size:11px; color:#4a5f8a;">WA: +6285196491134</span>
  </div>
</div>

<script>
  const phone = '6285196491134';

  function beli(nama, harga) {
    const pesan = `Halo, saya mau pesan:\n- ${nama} (1x) = Rp ${harga.toLocaleString()}\n\nTotal: Rp ${harga.toLocaleString()}`;
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(pesan)}`;
    window.open(url, '_blank');
  }
</script>
</body>
</html>
